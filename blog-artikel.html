<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogartikel - Hybridlogs</title>
    <meta name="description" content="Hybridlogs Blogartikel">
    <meta name="robots" content="index, follow">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📓</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&display=swap">
    <link rel="preload" href="css/styles.css" as="style">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="header-slot"></div>

<nav class="breadcrumb" aria-label="Breadcrumb">
    <div class="container">
        <ol class="breadcrumb-list">
            <li><a href="index.html">Home</a></li>
            <li class="breadcrumb-sep" aria-hidden="true">></li>
            <li><a href="blog.html">Blog</a></li>
            <li class="breadcrumb-sep" aria-hidden="true">></li>
            <li class="breadcrumb-current" id="blogBreadcrumbTitle" aria-current="page">Artikel</li>
        </ol>
    </div>
</nav>

<section class="section section-dark blog-post-page">
    <div class="container">
        <article class="blog-post" id="blogPost">
            <header class="blog-post-header" data-animate>
                <span class="blog-post-category" id="blogPostCategory"></span>
                <h1 id="blogPostTitle">Artikel</h1>
                <div class="blog-meta" id="blogPostMeta"></div>
                <p class="blog-post-excerpt" id="blogPostExcerpt"></p>
            </header>

            <div class="blog-post-image-wrap" id="blogPostImageWrap" hidden>
                <img id="blogPostImage" src="" alt="">
            </div>

            <div class="blog-post-content" id="blogPostContent"></div>
        </article>

        <div class="blog-post-not-found" id="blogPostNotFound" hidden>
            <h2>Artikel nicht gefunden</h2>
            <p>Der angeforderte Beitrag existiert nicht oder wurde verschoben.</p>
            <a href="blog.html" class="btn btn-outline">Zurück zum Blog</a>
        </div>
    </div>
</section>

<div id="footer-slot"></div>

<button class="back-to-top" id="backToTop" aria-label="Nach oben scrollen">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<script src="js/components.js" defer></script>
<script src="js/main.js" defer></script>
<script src="js/blog-data.js" defer></script>
<script src="js/blog.js" defer></script>
</body>
</html>
